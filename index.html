<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Event Check-in</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      background: #0b0d12;
      color: #fff;
      font-family: Arial, sans-serif
    }

    .wrap {
      max-width: 520px;
      margin: auto;
      padding: 20px
    }

    .card {
      background: #151922;
      border: 1px solid #2a3140;
      border-radius: 20px;
      padding: 18px
    }

    #reader {
      border-radius: 14px;
      overflow: hidden
    }

    #result {
      margin-top: 15px;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-weight: 700;
      background: #202633
    }

    input,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      font-size: 16px
    }

    input {
      background: #0f131b;
      color: white;
      border: 1px solid #394255
    }

    button {
      border: 0;
      font-weight: 700;
      cursor: pointer
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Event Check-in</h1>
      <p>Scan a QR ticket or enter the ticket ID manually.</p>
      <div id="reader"></div>
      <div id="result">Ready to scan</div>
      <input id="manual" placeholder="EVT-..."><button onclick="check(document.getElementById('manual').value)">Check
        ticket</button>
    </div>
  </div>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxSusqXU0G-rbY1xLd5aDcPCY3YFJQy6R5PdMgfG5eQTlGIbMvCUV8iS1yjXDpZNUo45A/exec";
    let busy = false, last = "", lastAt = 0;
    function check(ticket) {
  ticket = String(ticket || "").trim();

  const now = Date.now();

  if (
    !ticket ||
    busy ||
    (ticket === last && now - lastAt < 3000)
  ) return;

  busy = true;
  last = ticket;
  lastAt = now;

  show("Checking…", "#202633");

  const callbackName =
    "qrCallback_" + Date.now();

  window[callbackName] = function (x) {

    if (x.state === "VALID") {
      show("✅ " + x.message, "#123b28");
    }
    else if (x.state === "USED") {
      show("⚠️ " + x.message, "#4a3210");
    }
    else {
      show("❌ " + x.message, "#4b171c");
    }

    busy = false;

    delete window[callbackName];
    script.remove();
  };

  const script = document.createElement("script");

  script.src =
    API_URL +
    "?ticket=" +
    encodeURIComponent(ticket) +
    "&callback=" +
    callbackName;

  script.onerror = function () {
    show("❌ API connection failed", "#4b171c");
    busy = false;
    delete window[callbackName];
    script.remove();
  };

  document.body.appendChild(script);
}
  </script>
</body>

</html>
